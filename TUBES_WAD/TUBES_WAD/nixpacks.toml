[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.openssl', 'php83Extensions.tokenizer', 'php83Extensions.ctype', 'php83Extensions.bcmath', 'php83Extensions.zip']

[phases.build]
cmds = [
    'mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache',
    'chmod -R 775 storage bootstrap/cache',
    'composer install --no-dev --optimize-autoloader',
    'php artisan config:clear',
    'php artisan route:clear',
    'php artisan view:clear',
    'php artisan view:cache'
]

[start]
cmd = 'php artisan config:clear; php artisan view:clear; php artisan view:cache; php artisan migrate --force 2>&1; php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=$PORT'

